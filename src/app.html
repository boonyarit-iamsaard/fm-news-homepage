<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Boonyarit Iamsa-ard" />
    <meta
      name="description"
      content="This is a solution to the News homepage challenge on Frontend Mentor."
    />
    <title>Frontend Mentor | News homepage</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%sveltekit.assets%/images/favicon-32x32.png"
    />
    <!-- TODO: Avoid layout shift caused by web fonts -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: local(''),
          url('%sveltekit.assets%/fonts/inter-v12-latin-regular.woff2')
            format('woff2'),
          url('%sveltekit.assets%/fonts/inter-v12-latin-regular.woff')
            format('woff');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: local(''),
          url('%sveltekit.assets%/fonts/inter-v12-latin-700.woff2')
            format('woff2'),
          url('%sveltekit.assets%/fonts/inter-v12-latin-700.woff')
            format('woff');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 800;
        font-display: swap;
        src: local(''),
          url('%sveltekit.assets%/fonts/inter-v12-latin-800.woff2')
            format('woff2'),
          url('%sveltekit.assets%/fonts/inter-v12-latin-800.woff')
            format('woff');
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
